name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketplace_backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: marketplace_backend_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d marketplace_backend_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/marketplace_backend_test
      JWT_ACCESS_SECRET: test_access_secret_1234567890
      JWT_REFRESH_SECRET: test_refresh_secret_1234567890
      JWT_REFRESH_PEPPER: test_refresh_pepper_1234567890
      ADMIN_JWT_ACCESS_SECRET: test_admin_access_secret_1234567890
      ADMIN_JWT_REFRESH_SECRET: test_admin_refresh_secret_1234567890
      ADMIN_JWT_REFRESH_PEPPER: test_admin_refresh_pepper_1234567890
      CLOUDFLARE_R2_BUCKET: test-bucket
      CLOUDFLARE_R2_ENDPOINT: https://example.r2.cloudflarestorage.com
      CLOUDFLARE_R2_ACCESS_KEY_ID: test_access_key
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: test_secret_key
      CLOUDFLARE_R2_PUBLIC_BASE_URL: https://public.example.r2.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: marketplace_backend
          bundler-cache: true

      - name: CI suite
        run: bin/ci
